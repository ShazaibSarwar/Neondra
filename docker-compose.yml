version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: wfgts-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: wfgts
      POSTGRES_PASSWORD: wfgts_dev
      POSTGRES_DB: wfgts
    ports:
      - '5433:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U wfgts']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: wfgts-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data: